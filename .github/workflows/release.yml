name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add cman symlink to archives
        run: |
          for archive in dist/*.tar.gz; do
            dir=$(mktemp -d)
            tar -xzf "$archive" -C "$dir"
            # The archive contains a single top-level directory
            inner=$(find "$dir" -mindepth 1 -maxdepth 1 -type d | head -1)
            if [ -n "$inner" ] && [ -f "$inner/coremanager" ]; then
              ln -sf coremanager "$inner/cman"
              tar -C "$dir" -czf "$archive" "$(basename "$inner")"
            fi
            rm -rf "$dir"
          done

      - name: Re-upload modified archives
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz


